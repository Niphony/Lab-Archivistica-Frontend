# Proxy inverso unificado - Lab de Archivística
# 
# /                  -> Astro (pagina principal, host)
# /orfeo/            -> OrfeoNG
# /dspace/           -> DSpace
# /atom/             -> AtoM (placeholder)
# /tika/             -> Apache Tika

resolver 127.0.0.11 valid=10s ipv6=off;

server {
    listen 80;
    server_name localhost labhumanidades.udistrital.edu.co;

    location / {
        set $astro_upstream http://host.docker.internal:4321;
        proxy_pass $astro_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /orfeo/ {
        set $orfeo_upstream http://orfeo-nginx:80/;
        proxy_pass $orfeo_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect http://orfeo-nginx:80/ /orfeo/;
    }

    location /orfeo/socket/ {
        set $orfeo_socket_upstream http://orfeo-nginx:80/socket/;
        proxy_pass $orfeo_socket_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    location /orfeo/socket.io/ {
        set $orfeo_socketio_upstream http://orfeo-nginx:80/socket.io/;
        proxy_pass $orfeo_socketio_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    location /dspace/ {
        set $dspace_upstream http://dspace-frontend:4000/;
        proxy_pass $dspace_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /atom/ {
        set $atom_upstream http://host.docker.internal:63001/;
        proxy_pass $atom_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /tika/ {
        set $tika_upstream http://apache-tika:9998;
        proxy_pass $tika_upstream;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_request_buffering off;
        proxy_buffering off;
        client_max_body_size 0;
    }
}
