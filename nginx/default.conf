# Proxy inverso unificado - Lab de Archivística
# 
# /                  -> Astro (pagina principal)
# /orfeo/            -> OrfeoNG
# /dspace/           -> DSpace
# /atom/             -> AtoM
# /tika/             -> Apache Tika

upstream astro {
    server host.docker.internal:4321;
}

upstream orfeo {
    server host.docker.internal:64000;
}

upstream dspace {
    server host.docker.internal:4000;
}

upstream atom {
    server host.docker.internal:63001;
}

upstream tika {
    server host.docker.internal:9998;
}

server {
    listen 80;
    server_name localhost labhumanidades.udistrital.edu.co;

    location / {
        proxy_pass http://astro;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /orfeo/ {
        proxy_pass http://orfeo/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect http://orfeo/ /orfeo/;
    }

    location /orfeo/socket/ {
        proxy_pass http://orfeo/socket/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    location /orfeo/socket.io/ {
        proxy_pass http://orfeo/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    location /dspace/ {
        proxy_pass http://dspace/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /atom/ {
        proxy_pass http://atom/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /tika/ {
        proxy_pass http://tika/;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_request_buffering off;
        proxy_buffering off;
        client_max_body_size 0;
    }
}
